protocol:
  protocol_id: plan_a_v1
  seed: 7
  split_name: analysis
  num_classes: 10
  output_root: artifacts/reports/generated
  datasets:
    cifar10:
      root: data/cifar10
      train: false
      download: false
    svhn:
      root: data/svhn
      split: test
      download: false
  analysis:
    easy_id_per_class: 4
    hard_id_per_class: 4
    ambiguous_per_pair: 4
    ood_count: 12
    unknown_supervision_count: 12
    dataloader:
      batch_size: 8
      drop_last: true
      num_workers: 0
  ambiguous:
    recipe: mixup
    alpha_min: 0.35
    alpha_max: 0.65
    class_pairs:
      - [3, 5]
      - [4, 7]
      - [1, 9]
  hard_id:
    recipes:
      - gaussian_blur
      - low_res
    blur_kernel_size: 5
    blur_sigma: 1.0
    low_res_size: 16
  extensions:
    overlay_enabled: false
    occlusion_enabled: false
    noise_enabled: false
    texture_enabled: false

