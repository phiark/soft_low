protocol:
  protocol_id: plan_a_v0_3debug_r2_eval
  seed: 7
  split_name: validation
  output_root: artifacts/reports/generated
  num_classes: 10
  datasets:
    cifar10:
      root: data/cifar10
      train: false
      download: false
    svhn:
      root: data/svhn
      split: test
      download: false
  analysis:
    easy_id_per_class: 200
    hard_id_per_class: 200
    ambiguous_per_pair: 150
    ood_count: 1000
    unknown_supervision_count: 1000
    dataloader:
      batch_size: 128
      drop_last: false
      num_workers: 0
  ambiguous:
    recipes:
      - mixup
    alpha_min: 0.35
    alpha_max: 0.65
    occlusion_fraction: 0.35
    class_pairs:
      - [3, 5]
      - [4, 7]
      - [1, 9]
  hard_id:
    recipes:
      - gaussian_blur
      - low_res
    blur_kernel_size: 5
    blur_sigma: 1.0
    low_res_size: 16
  extensions:
    overlay_enabled: false
    occlusion_enabled: false
    noise_enabled: false
    texture_enabled: false
